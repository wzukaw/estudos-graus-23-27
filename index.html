<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Estudos dos Graus 23 a 27</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <main id="gate" class="gate" aria-labelledby="gate-title">
    <section class="gate-panel">
      <img class="gate-logo" src="assets/logo-supremo-conselho.png" alt="Supremo Conselho do Brasil do Grau 33">
      <p class="eyebrow">Acesso restrito</p>
      <h1 id="gate-title">Estudos dos Graus 23 a 27</h1>
      <p>Informe a senha para abrir o material.</p>
      <form id="password-form" autocomplete="off">
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" autofocus required>
        <button type="submit">Entrar</button>
      </form>
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </section>
  </main>
  <main id="app" class="app" hidden>
    <header class="topbar">
      <div>
        <p class="eyebrow">Material de estudo</p>
        <h1>Estudos dos Graus 23 a 27</h1>
      </div>
      <div class="toolbar">
        <button id="back-button" class="back-button" type="button">Voltar</button>
        <input id="search" type="search" placeholder="Buscar no estudo">
      </div>
    </header>
    <section id="content" class="content"></section>
  </main>
  <script src="assets/app.js"></script>
</body>
</html>
